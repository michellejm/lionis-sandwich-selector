<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandwich Selector</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2e8;
        --paper: #ffffff;
        --ink: #141414;
        --muted: rgba(20, 20, 20, 0.68);
        --faint: rgba(20, 20, 20, 0.5);
        --panel: rgba(255, 255, 255, 0.92);
        --panel2: rgba(255, 255, 255, 0.78);
        --accent: #0f8a3a; /* Italian green */
        --accent2: #c61b1b; /* Italian red */
        --danger: #b11a1a;
        --ring: rgba(15, 138, 58, 0.18);
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
        --border: rgba(20, 20, 20, 0.12);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background:
          linear-gradient(90deg, rgba(15, 138, 58, 0.09), rgba(255, 255, 255, 0) 22%, rgba(198, 27, 27, 0.08)),
          radial-gradient(1100px 700px at 20% 10%, rgba(15, 138, 58, 0.12), transparent 60%),
          radial-gradient(1000px 700px at 85% 20%, rgba(198, 27, 27, 0.1), transparent 60%),
          var(--bg);
        color: var(--ink);
        line-height: 1.35;
      }

      a {
        color: inherit;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 18px 44px;
      }

      .header {
        position: relative;
        padding-top: 12px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      .header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), #ffffff 44%, var(--accent2));
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      h1 {
        font-family:
          ui-serif,
          Georgia,
          "Times New Roman",
          Times,
          serif;
        font-size: 24px;
        margin: 0;
        letter-spacing: 0.25px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.75);
        color: var(--ink);
        border-radius: 999px;
        padding: 10px 12px;
        transition:
          transform 0.06s ease,
          background 0.2s ease,
          border-color 0.2s ease;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.92);
        border-color: rgba(20, 20, 20, 0.18);
      }

      button:active {
        transform: translateY(1px);
      }

      button.primary {
        background: linear-gradient(135deg, rgba(15, 138, 58, 0.98), rgba(15, 138, 58, 0.82));
        border-color: rgba(15, 138, 58, 0.42);
        box-shadow: 0 12px 26px rgba(15, 138, 58, 0.18);
        color: #fff;
      }

      button.primary:hover {
        background: linear-gradient(135deg, rgba(15, 138, 58, 1), rgba(15, 138, 58, 0.86));
      }

      button.ghost {
        background: transparent;
      }

      button.danger {
        border-color: rgba(198, 27, 27, 0.28);
      }

      button.danger:hover {
        border-color: rgba(198, 27, 27, 0.44);
        background: rgba(198, 27, 27, 0.1);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: start;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        overflow: clip;
      }

      .panelHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 14px 10px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.5));
      }

      .panelHeader h2 {
        margin: 0;
        font-size: 14px;
        color: rgba(20, 20, 20, 0.82);
        letter-spacing: 0.25px;
        text-transform: uppercase;
      }

      .panelBody {
        padding: 14px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.8);
        color: rgba(20, 20, 20, 0.86);
        font-size: 12px;
        white-space: nowrap;
      }

      .pill b {
        font-weight: 650;
        color: rgba(20, 20, 20, 0.92);
      }

      .searchRow {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .searchRow input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        padding: 10px 12px;
        outline: none;
      }

      .searchRow input:focus {
        border-color: rgba(15, 138, 58, 0.55);
        box-shadow: 0 0 0 4px var(--ring);
      }

      .list {
        display: grid;
        gap: 8px;
        max-height: 420px;
        overflow: auto;
        padding-right: 4px;
      }

      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(20, 20, 20, 0.1);
        background: rgba(255, 255, 255, 0.8);
      }

      .item:hover {
        border-color: rgba(15, 138, 58, 0.22);
      }

      .itemLeft {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .itemName {
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .itemHint {
        color: var(--faint);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .check {
        inline-size: 18px;
        block-size: 18px;
        accent-color: var(--accent);
      }

      .tagRow {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(20, 20, 20, 0.12);
        background: rgba(255, 255, 255, 0.85);
        font-size: 12px;
      }

      .tag button {
        padding: 0;
        border: none;
        background: transparent;
        color: rgba(20, 20, 20, 0.7);
        line-height: 1;
      }

      .tag button:hover {
        color: rgba(20, 20, 20, 0.92);
      }

      .small {
        color: var(--muted);
        font-size: 12px;
      }

      .toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.92);
        color: rgba(20, 20, 20, 0.92);
        border: 1px solid rgba(20, 20, 20, 0.14);
        border-radius: 999px;
        padding: 10px 12px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .toast.show {
        opacity: 1;
      }

      .recommendations {
        margin-top: 14px;
      }

      .recList {
        display: grid;
        gap: 8px;
      }

      .recItem {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(20, 20, 20, 0.1);
        background: rgba(255, 255, 255, 0.8);
      }

      .tabs {
        display: flex;
        gap: 4px;
      }

      .tabBtn {
        border-radius: 8px;
        padding: 5px 10px;
        font-size: 12px;
        background: transparent;
        border-color: transparent;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .tabBtn.active {
        background: rgba(15, 138, 58, 0.12);
        border-color: rgba(15, 138, 58, 0.3);
        color: var(--accent);
        font-weight: 600;
      }

      .orderBadge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--accent2);
        color: white;
        border-radius: 999px;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
      }

      .orderItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(20, 20, 20, 0.1);
        background: rgba(255, 255, 255, 0.8);
      }

      .qtyControls {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .qtyBtn {
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 6px;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qtyNum {
        font-size: 13px;
        font-weight: 600;
        min-width: 18px;
        text-align: center;
      }

      .aiSection {
        margin-bottom: 14px;
      }

      .aiInputRow {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .aiInputRow input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        padding: 10px 12px;
        outline: none;
      }

      .aiInputRow input:focus {
        border-color: rgba(198, 27, 27, 0.5);
        box-shadow: 0 0 0 4px rgba(198, 27, 27, 0.18);
      }

      .aiLabel {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .aiDivider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 12px 0;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .loading {
        animation: pulse 1.2s ease infinite;
        color: var(--muted);
        font-size: 13px;
        padding: 6px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="title">
          <h1>Lioni’s Sandwich Selector</h1>
          <p class="subtitle">Pick mains and sides, then copy a clean order summary.</p>
        </div>
        <div class="actions">
          <button id="clearBtn" class="danger" type="button">Clear</button>
          <button id="sampleBtn" class="ghost" type="button">Load example</button>
        </div>
      </div>

      <div class="grid">
        <section class="panel">
          <div class="panelHeader">
            <h2>Ingredients</h2>
            <span id="countPill" class="pill" aria-live="polite"></span>
          </div>
          <div class="panelBody">
            <div class="searchRow" style="grid-template-columns: 1fr auto">
              <select
                id="presetSelect"
                style="
                  width: 100%;
                  border-radius: 12px;
                  border: 1px solid rgba(255, 255, 255, 0.14);
                  background: rgba(255, 255, 255, 0.05);
                  color: var(--text);
                  padding: 10px 12px;
                  outline: none;
                "
              >
                <option value="">Load a Lioni’s preset (by #)...</option>
              </select>
              <button id="applyPresetBtn" type="button">Apply</button>
            </div>

            <div class="searchRow">
              <input id="searchInput" type="search" placeholder="Search ingredients (e.g., chicken, pesto)..." />
              <button id="addCustomBtn" type="button">Add custom</button>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 12px">
              <div>
                <div class="pill" style="margin-bottom: 10px"><b>Mains</b> protein/veg base</div>
                <div id="mainsList" class="list" role="list"></div>
              </div>
              <div>
                <div class="pill" style="margin-bottom: 10px"><b>Sides</b> sauces/toppings</div>
                <div id="sidesList" class="list" role="list"></div>
              </div>
            </div>

            <div class="tagRow" aria-label="Selected ingredients">
              <div id="selectedTags" style="display: contents"></div>
            </div>
          </div>
        </section>

        <section class="panel" id="recPanel">
          <div class="panelHeader">
            <h2 id="recPanelTitle">Sandwiches</h2>
            <div class="tabs">
              <button id="tabSandwiches" class="tabBtn active" type="button">
                Sandwiches <span id="recCountPill" class="pill" style="padding:2px 7px;font-size:11px" aria-live="polite"></span>
              </button>
              <button id="tabOrder" class="tabBtn" type="button">
                Order list <span id="orderBadge" class="orderBadge" style="display:none"></span>
              </button>
            </div>
          </div>
          <div class="panelBody">
            <div id="describeSection" class="aiSection">
              <div class="aiInputRow">
                <input id="describeInput" type="text" placeholder="Describe what you want (e.g. spicy chicken with greens)…" />
                <button id="findBtn" type="button">Ask AI</button>
              </div>
              <div id="aiResults"></div>
            </div>
            <div id="recList" class="recList"></div>
            <div id="orderListEl" class="recList" style="display:none"></div>
          </div>
        </section>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
      const STORAGE_KEY = "sandwich-selector:v1";

      /** @type {{id: string, name: string, hint?: string, kind: "main" | "side"}[]} */
      const DEFAULT_INGREDIENTS = [
        // Mains
        { id: "grilled-chicken", name: "Grilled chicken", hint: "warm protein", kind: "main" },
        { id: "fried-chicken-cutlet", name: "Chicken cutlet", hint: "crispy", kind: "main" },
        { id: "roast-beef", name: "Roast beef", hint: "classic", kind: "main" },

        // Sides
        { id: "lettuce", name: "Lettuce", hint: "shredded/leaf", kind: "side" },

        { id: "stuffed-mushrooms", name: "Stuffed mushrooms", hint: "topping", kind: "side" },
        { id: "broccoli-rabe", name: "Broccoli rabe", hint: "bitter greens", kind: "side" },
        { id: "olive-oil", name: "Olive oil", hint: "extra virgin", kind: "side" },
        { id: "vinegar", name: "Vinegar", hint: "red wine vinegar", kind: "side" },
        { id: "balsamic-vinegar", name: "Balsamic vinegar", hint: "tangy/sweet", kind: "side" },

        { id: "hot-sauce", name: "Hot sauce", hint: "spicy", kind: "side" },
        { id: "horseradish", name: "Horseradish", hint: "sharp", kind: "side" },

        { id: "black-pepper", name: "Black pepper", hint: "seasoning", kind: "side" },

        // Additional mains
        { id: "veal", name: "Veal cutlet", hint: "milk-fed veal", kind: "main" },
        { id: "roast-pork", name: "Roast pork", hint: "slow roasted", kind: "main" },
        { id: "sicilian-salami", name: "Sicilian salami", hint: "spicy", kind: "main" },
        { id: "genoa-salami", name: "Genoa salami", hint: "mild", kind: "main" },
        { id: "bologna", name: "Bologna", hint: "classic deli", kind: "main" },
        { id: "bresaola", name: "Bresaola", hint: "cured beef", kind: "main" },
        { id: "pepper-ham", name: "Pepper ham", hint: "spicy ham", kind: "main" },
        { id: "olive-loaf", name: "Olive loaf", hint: "deli meat", kind: "main" },
        { id: "honey-turkey", name: "Honey turkey", hint: "sweet roasted", kind: "main" },
        { id: "steak", name: "Steak", hint: "Thursdays only", kind: "main" },
        { id: "potatoes-eggs", name: "Potatoes & eggs", hint: "Italian classic", kind: "main" },
        { id: "shrimp", name: "Shrimp", hint: "parmigiana, Fridays only", kind: "main" },
        // Additional sides
        { id: "sun-dried-tomatoes", name: "Sun-dried tomatoes", hint: "sweet/tangy", kind: "side" },
        { id: "swiss-cheese", name: "Swiss cheese", hint: "mild cheese", kind: "side" },
        { id: "white-american-cheese", name: "White american cheese", hint: "melty", kind: "side" },

        { id: "gravy", name: "Gravy", hint: "brown gravy", kind: "side" },
        { id: "bacon", name: "Bacon", hint: "crispy", kind: "side" },
        { id: "smoked-mozzarella", name: "Smoked mozzarella", hint: "Lioni smoked mozz", kind: "side" },
      ];

      /** @type {{id: string, label: string, ingredientIds: string[]}[]} */
      const PRESETS = [
        { id: "1",   label: "#1 Frank Sinatra",                    ingredientIds: ["salami", "mozzarella", "olive-oil", "salt", "black-pepper", "oregano"] },
        { id: "2",   label: "#2 Dean Martin",                      ingredientIds: ["prosciutto", "mozzarella", "olive-oil", "black-pepper"] },
        { id: "3",   label: "#3 Perry Como",                       ingredientIds: ["ham", "mozzarella", "fresh-basil", "sun-dried-tomatoes", "olive-oil", "salt", "black-pepper"] },
        { id: "4",   label: "#4 The Italiano",                     ingredientIds: ["mozzarella", "tomato", "fresh-basil", "olive-oil", "salt", "black-pepper"] },

        applyPresetBtn: document.getElementById("applyPresetBtn"),
        mainsList: document.getElementById("mainsList"),
        sidesList: document.getElementById("sidesList"),
        selectedTags: document.getElementById("selectedTags"),
        countPill: document.getElementById("countPill"),
        clearBtn: document.getElementById("clearBtn"),
        sampleBtn: document.getElementById("sampleBtn"),
        addCustomBtn: document.getElementById("addCustomBtn"),
        toast: document.getElementById("toast"),
        recPanel: document.getElementById("recPanel"),
        recList: document.getElementById("recList"),
        recCountPill: document.getElementById("recCountPill"),
        orderListEl: document.getElementById("orderListEl"),
        tabSandwiches: document.getElementById("tabSandwiches"),
        tabOrder: document.getElementById("tabOrder"),
        orderBadge: document.getElementById("orderBadge"),
        recPanelTitle: document.getElementById("recPanelTitle"),
        describeSection: document.getElementById("describeSection"),
        describeInput: document.getElementById("describeInput"),
        findBtn: document.getElementById("findBtn"),
        aiResults: document.getElementById("aiResults"),
      };

      let currentTab = "sandwiches";

      /** @type {{ingredients: typeof DEFAULT_INGREDIENTS, selectedIds: string[], orderItems: {presetId: string, label: string, qty: number}[]}} */
      let state = loadState();

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { ingredients: DEFAULT_INGREDIENTS.slice(), selectedIds: [], orderItems: [] };
          const parsed = JSON.parse(raw);
          const ingredients = Array.isArray(parsed.ingredients) ? parsed.ingredients : DEFAULT_INGREDIENTS.slice();
          const selectedIds = Array.isArray(parsed.selectedIds) ? parsed.selectedIds : [];
          const orderItems = Array.isArray(parsed.orderItems) ? parsed.orderItems : [];
          return { ingredients, selectedIds, orderItems };
        } catch {
          return { ingredients: DEFAULT_INGREDIENTS.slice(), selectedIds: [], orderItems: [] };
        }
      }

      function saveState(partial = {}) {
        state = { ...state, ...partial };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function normalized(s) {
        return String(s || "")
          .toLowerCase()
          .normalize("NFKD")
          .replace(/\p{Diacritic}/gu, "");
      }

      function getSelectedIngredients() {
        const selectedSet = new Set(state.selectedIds);
        return state.ingredients.filter((i) => selectedSet.has(i.id));
      }

      function render() {
        const q = normalized(els.searchInput.value);
        const selectedSet = new Set(state.selectedIds);
        const ingredients = state.ingredients
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: "base" }))
          .filter((i) => (q ? normalized(i.name + " " + (i.hint || "")).includes(q) : true));

        const mains = ingredients.filter((i) => i.kind === "main");
        const sides = ingredients.filter((i) => i.kind === "side");

        els.mainsList.innerHTML = mains.map((i) => itemHtml(i, selectedSet.has(i.id))).join("");
        els.sidesList.innerHTML = sides.map((i) => itemHtml(i, selectedSet.has(i.id))).join("");

        const selected = getSelectedIngredients().sort((a, b) => a.name.localeCompare(b.name));
        els.selectedTags.innerHTML = selected.length
          ? selected.map((i) => tagHtml(i)).join("")
          : `<div class="small">No ingredients selected yet. Use the checkboxes to build your sandwich.</div>`;

        const selectedMains = selected.filter((x) => x.kind === "main").length;
        const selectedSides = selected.filter((x) => x.kind === "side").length;
        els.countPill.textContent = `${selectedMains} mains • ${selectedSides} sides`;

        renderRecommendations();
        renderOrderList();
      }

      function renderRecommendations() {
        const selectedSet = new Set(state.selectedIds);

        if (selectedSet.size === 0) {
          els.recCountPill.textContent = "";
          els.recList.innerHTML = `<div class="small" style="padding:4px 0">Select ingredients to see matching sandwiches.</div>`;
          return;
        }

        const matches = PRESETS.map((preset) => {
          const included = preset.ingredientIds.filter((id) => selectedSet.has(id));
          return { preset, included };
        })
          .filter((r) => r.included.length === selectedSet.size)
          .sort((a, b) => b.included.length - a.included.length);

        els.recCountPill.textContent = matches.length ? `${matches.length}` : "";

        if (matches.length === 0) {
          els.recList.innerHTML = `<div class="small" style="padding:4px 0">No sandwiches match your current selection.</div>`;
          return;
        }

        els.recList.innerHTML = matches.map(({ preset }) => {
          const [num, rest] = preset.label.includes("—")
            ? preset.label.split("—").map((s) => s.trim())
            : [preset.label, ""];

          const chips = preset.ingredientIds.map((id) => {
            const ing = state.ingredients.find((i) => i.id === id);
            const name = ing ? ing.name : id;
            const isSelected = selectedSet.has(id);
            const style = isSelected
              ? "background:rgba(15,138,58,.15);border-color:rgba(15,138,58,.4);color:var(--ink);font-weight:600"
              : "background:rgba(20,20,20,.05);border-color:transparent;color:var(--faint)";
            return `<span class="pill" style="padding:3px 8px;font-size:11px;${style}">${escapeHtml(name)}</span>`;
          }).join("");

          return `
            <div class="recItem" style="flex-direction:column;align-items:flex-start;gap:6px">
              <div style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px">
                <div style="font-weight:600;font-size:13px;min-width:0">${escapeHtml(num)}${rest ? `<span style="font-weight:400;color:var(--muted)"> — ${escapeHtml(rest)}</span>` : ""}</div>
                <button class="addToOrderBtn primary" type="button" data-preset-id="${escapeAttr(preset.id)}" data-preset-label="${escapeAttr(preset.label)}" style="flex-shrink:0;border-radius:8px;padding:5px 10px;font-size:12px">+ Add</button>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">${chips}</div>
            </div>
          `;
        }).join("");
      }

      function renderOrderList() {
        const total = state.orderItems.reduce((s, x) => s + x.qty, 0);
        els.orderBadge.textContent = total;
        els.orderBadge.style.display = total > 0 ? "" : "none";

        if (state.orderItems.length === 0) {
          els.orderListEl.innerHTML = `<div class="small" style="padding:4px 0">No sandwiches added yet. Find a sandwich and click "+ Add".</div>`;
          return;
        }

        els.orderListEl.innerHTML = state.orderItems.map((item) => `
          <div class="orderItem">
            <div style="font-weight:600;font-size:13px;min-width:0;flex:1">${escapeHtml(item.label)}</div>
            <div class="qtyControls">
              <button class="qtyBtn" type="button" data-action="dec" data-preset-id="${escapeAttr(item.presetId)}">−</button>
              <span class="qtyNum">${item.qty}</span>
              <button class="qtyBtn" type="button" data-action="inc" data-preset-id="${escapeAttr(item.presetId)}">+</button>
              <button class="qtyBtn danger" type="button" data-action="remove" data-preset-id="${escapeAttr(item.presetId)}" style="margin-left:4px">×</button>
            </div>
          </div>
        `).join("");
      }

      function switchTab(tab) {
        currentTab = tab;
        els.tabSandwiches.classList.toggle("active", tab === "sandwiches");
        els.tabOrder.classList.toggle("active", tab === "order");
        els.recList.style.display = tab === "sandwiches" ? "" : "none";
        els.describeSection.style.display = tab === "sandwiches" ? "" : "none";
        els.orderListEl.style.display = tab === "order" ? "" : "none";
        els.recPanelTitle.textContent = tab === "sandwiches" ? "Sandwiches" : "Order list";
      }

      async function findByDescription() {
        const description = els.describeInput.value.trim();
        if (!description) return;

        const BAKED_KEY = "__GEMINI_API_KEY__";
        const API_KEY_STORAGE = "lioni-gemini-key";
        let apiKey = BAKED_KEY.startsWith("__") ? localStorage.getItem(API_KEY_STORAGE) : BAKED_KEY;
        if (!apiKey) {
          apiKey = window.prompt("Enter your Gemini API key (free from aistudio.google.com — stored locally, never sent anywhere but Google):");
          if (!apiKey) return;
          localStorage.setItem(API_KEY_STORAGE, apiKey.trim());
          apiKey = apiKey.trim();
        }

        els.findBtn.disabled = true;
        els.aiResults.innerHTML = `<div class="loading">Finding matches…</div>`;

        const sandwichList = PRESETS.map((p) => {
          const ingredientNames = p.ingredientIds
            .map((id) => { const ing = state.ingredients.find((i) => i.id === id); return ing ? ing.name : id; })
            .join(", ");
          return `ID:${p.id} | ${p.label} | ${ingredientNames}`;
        }).join("\n");

        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `You help customers pick from Lioni's Italian Heroes sandwich menu.\n\nCustomer says: "${description}"\n\nSandwiches:\n${sandwichList}\n\nReturn the IDs of the 2–4 sandwiches that best match the customer's description. Consider ingredients and flavor profile. Reply with ONLY a valid JSON array of ID strings — no explanation, no markdown. Example: ["65","32"]`,
                }],
              }],
              generationConfig: { maxOutputTokens: 256 },
            }),
          });

          if (res.status === 400 || res.status === 403) {
            localStorage.removeItem(API_KEY_STORAGE);
            throw new Error("Invalid API key — it has been cleared. Try again.");
          }
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
          }

          const data = await res.json();
          const rawText = data.candidates[0].content.parts[0].text.trim();
          const jsonText = rawText.replace(/^```(?:json)?\n?/, "").replace(/\n?```$/, "");
          const ids = JSON.parse(jsonText);
          const suggestions = ids.map((id) => PRESETS.find((p) => p.id === String(id))).filter(Boolean);
          renderAiSuggestions(suggestions);
        } catch (err) {
          els.aiResults.innerHTML = `<div class="small" style="color:var(--danger);padding:4px 0">Error: ${escapeHtml(err.message)}</div>`;
        } finally {
          els.findBtn.disabled = false;
        }
      }

      function renderAiSuggestions(suggestions) {
        if (!suggestions.length) {
          els.aiResults.innerHTML = `<div class="small" style="padding:4px 0">No matches found — try rephrasing.</div>`;
          return;
        }
        const selectedSet = new Set(state.selectedIds);
        const items = suggestions.map((preset) => {
          const chips = preset.ingredientIds.map((id) => {
            const ing = state.ingredients.find((i) => i.id === id);
            const name = ing ? ing.name : id;
            const isSelected = selectedSet.has(id);
            const style = isSelected
              ? "background:rgba(15,138,58,.15);border-color:rgba(15,138,58,.4);color:var(--ink);font-weight:600"
              : "background:rgba(20,20,20,.05);border-color:transparent;color:var(--faint)";
            return `<span class="pill" style="padding:3px 8px;font-size:11px;${style}">${escapeHtml(name)}</span>`;
          }).join("");
          return `
            <div class="recItem" style="flex-direction:column;align-items:flex-start;gap:6px;border-color:rgba(198,27,27,.22);background:rgba(198,27,27,.04)">
              <div style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px">
                <div style="font-weight:600;font-size:13px;min-width:0">${escapeHtml(preset.label)}</div>
                <button class="addToOrderBtn primary" type="button" data-preset-id="${escapeAttr(preset.id)}" data-preset-label="${escapeAttr(preset.label)}" style="flex-shrink:0;border-radius:8px;padding:5px 10px;font-size:12px">+ Add</button>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">${chips}</div>
            </div>`;
        }).join("");
        els.aiResults.innerHTML = `<div class="aiLabel">AI suggestions</div><div class="recList" style="margin-bottom:0">${items}</div><hr class="aiDivider">`;
      }

      function addToOrder(presetId, label) {
        const items = state.orderItems.slice();
        const existing = items.find((x) => x.presetId === presetId);
        if (existing) {
          existing.qty += 1;
        } else {
          items.push({ presetId, label, qty: 1 });
        }
        saveState({ orderItems: items });
        renderOrderList();
        showToast(`Added ${label}.`);
      }

      function changeOrderQty(presetId, delta) {
        const items = state.orderItems.slice();
        const item = items.find((x) => x.presetId === presetId);
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) items.splice(items.indexOf(item), 1);
        saveState({ orderItems: items });
        renderOrderList();
      }

      function removeFromOrder(presetId) {
        saveState({ orderItems: state.orderItems.filter((x) => x.presetId !== presetId) });
        renderOrderList();
      }

      function itemHtml(i, checked) {
        const hint = i.hint ? `<div class="itemHint">${escapeHtml(i.hint)}</div>` : "";
        return `
          <label class="item" data-id="${escapeAttr(i.id)}" role="listitem">
            <span class="itemLeft">
              <input class="check" type="checkbox" ${checked ? "checked" : ""} />
              <span style="min-width:0">
                <div class="itemName">${escapeHtml(i.name)}</div>
                ${hint}
              </span>
            </span>
          </label>
        `;
      }

      function tagHtml(i) {
        const kindBadge =
          i.kind === "main"
            ? `<span class="pill" style="padding:4px 8px;border-color:rgba(124,92,255,.35);background:rgba(124,92,255,.15)"><b>Main</b></span>`
            : `<span class="pill" style="padding:4px 8px;border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.12)"><b>Side</b></span>`;

        return `
          <span class="tag" data-id="${escapeAttr(i.id)}">
            ${kindBadge}
            <span>${escapeHtml(i.name)}</span>
            <button type="button" aria-label="Remove ${escapeAttr(i.name)}">×</button>
          </span>
        `;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(s) {
        return escapeHtml(s).replaceAll("`", "&#096;");
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => els.toast.classList.remove("show"), 1400);
      }

      function toggleIngredient(id) {
        const set = new Set(state.selectedIds);
        if (set.has(id)) set.delete(id);
        else set.add(id);
        saveState({ selectedIds: Array.from(set) });
        render();
      }

      function removeIngredient(id) {
        const set = new Set(state.selectedIds);
        set.delete(id);
        saveState({ selectedIds: Array.from(set) });
        render();
      }

      function clearAll() {
        saveState({ selectedIds: [] });
        render();
        showToast("Cleared.");
      }

      function loadExample() {
        const example = ["grilled-chicken", "green-pesto", "provolone", "tomato", "banana-peppers"];
        saveState({ selectedIds: example });
        render();
        showToast("Example loaded.");
      }

      function addCustom() {
        const raw = window.prompt("Add a custom ingredient name (it will be selectable):");
        const name = (raw || "").trim();
        if (!name) return;

        const kindRaw = window.prompt('Type "main" or "side" for this ingredient:', "side");
        const kind = String(kindRaw || "").trim().toLowerCase() === "main" ? "main" : "side";

        const idBase = normalized(name)
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 48);
        const id = `${idBase || "custom"}-${Math.random().toString(16).slice(2, 8)}`;

        saveState({ ingredients: state.ingredients.concat([{ id, name, kind }]) });
        toggleIngredient(id);
        showToast("Added.");
      }

      function initPresets() {
        els.presetSelect.innerHTML =
          `<option value="">Load a Lioni’s preset (by #)...</option>` +
          PRESETS.map((p) => `<option value="${escapeAttr(p.id)}">${escapeHtml(p.label)}</option>`).join("");
      }

      function applyPreset() {
        const id = els.presetSelect.value;
        if (!id) {
          showToast("Pick a preset first.");
          return;
        }
        const preset = PRESETS.find((p) => p.id === id);
        if (!preset) return;

        const available = new Set(state.ingredients.map((i) => i.id));
        const selectedIds = preset.ingredientIds.filter((x) => available.has(x));

        saveState({ selectedIds });
        render();
        showToast(`Applied ${preset.label.split("—")[0].trim()}.`);
      }

      // Events
      els.searchInput.addEventListener("input", () => render());

      els.mainsList.addEventListener("change", (e) => {
        const label = e.target.closest("label[data-id]");
        if (!label) return;
        toggleIngredient(label.getAttribute("data-id"));
      });
      els.sidesList.addEventListener("change", (e) => {
        const label = e.target.closest("label[data-id]");
        if (!label) return;
        toggleIngredient(label.getAttribute("data-id"));
      });

      els.selectedTags.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const tag = e.target.closest(".tag[data-id]");
        if (!tag) return;
        removeIngredient(tag.getAttribute("data-id"));
      });

      els.clearBtn.addEventListener("click", () => clearAll());
      els.sampleBtn.addEventListener("click", () => loadExample());
      els.addCustomBtn.addEventListener("click", () => addCustom());
      els.applyPresetBtn.addEventListener("click", () => applyPreset());

      els.tabSandwiches.addEventListener("click", () => switchTab("sandwiches"));

      els.findBtn.addEventListener("click", () => findByDescription());
      els.describeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") findByDescription(); });

      els.aiResults.addEventListener("click", (e) => {
        const btn = e.target.closest(".addToOrderBtn");
        if (!btn) return;
        addToOrder(btn.dataset.presetId, btn.dataset.presetLabel);
      });
      els.tabOrder.addEventListener("click", () => switchTab("order"));

      els.recList.addEventListener("click", (e) => {
        const btn = e.target.closest(".addToOrderBtn");
        if (!btn) return;
        addToOrder(btn.dataset.presetId, btn.dataset.presetLabel);
      });

      els.orderListEl.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const { action, presetId } = btn.dataset;
        if (action === "inc") changeOrderQty(presetId, 1);
        else if (action === "dec") changeOrderQty(presetId, -1);
        else if (action === "remove") removeFromOrder(presetId);
      });

      // First render
      initPresets();
      render();
    </script>
  </body>
</html>
